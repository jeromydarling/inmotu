name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against"
        required: false
        default: "https://inmotu.pro"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://inmotu.pro' }}
      # Repo secret/var overrides the committed fallback (which only ever lets
      # the purge endpoint delete disposable e2e+ test accounts).
      E2E_PURGE_TOKEN: ${{ secrets.E2E_PURGE_TOKEN || vars.E2E_PURGE_TOKEN || 'e2e-purge-inmotu-2026-7Kq2mZ' }}
    steps:
      - uses: actions/checkout@v4

      # Capture the version that's live RIGHT NOW (before our push finishes
      # deploying), so the gate below can wait for it to actually change.
      - name: Capture current deployment version
        run: |
          prev=$(curl -s "$BASE_URL/api/health" | jq -r '.version // "none"')
          echo "PREV_VERSION=$prev" >> "$GITHUB_ENV"
          echo "Currently live version: $prev"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      # Tests run against the deployed Worker. A push to main also triggers the
      # Cloudflare deploy, so wait until THIS push's build is live before
      # testing — detected by the deployment version changing from the value
      # captured at the start of the run.
      - name: Wait for the new deployment to go live
        run: |
          echo "Waiting for a version != '$PREV_VERSION' at $BASE_URL…"
          for i in $(seq 1 60); do
            cur=$(curl -s "$BASE_URL/api/health" | jq -r '.version // "none"')
            echo "attempt $i → version $cur"
            if [ -n "$cur" ] && [ "$cur" != "none" ] && [ "$cur" != "$PREV_VERSION" ]; then
              echo "New build is live (version $cur)."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for a new deployment at $BASE_URL (still $PREV_VERSION)"
          exit 1

      # TEMP diagnostic: print the raw Workers AI translate probe (remove later).
      - name: Probe translation model
        run: |
          echo "--- /api/translate?debug probe ---"
          curl -s -X POST "$BASE_URL/api/translate?debug=$E2E_PURGE_TOKEN" \
            -H 'content-type: application/json' -d '{}' | head -c 3000
          echo

      - name: Run E2E (desktop + mobile)
        run: npx playwright test --project=desktop --project=mobile

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces / videos / screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
